name: Full CI/CD Pipeline

on:
  push:
    branches:
      - b1

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Pull latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ 3. Validate project structure
      - name: Validate project structure
        run: |
          echo "Checking project structure..."
          if [ ! -f "server/package.json" ]; then
            echo "❌ server/package.json not found"
            exit 1
          fi
          if [ ! -f "client/package.json" ]; then
            echo "❌ client/package.json not found"
            exit 1
          fi
          if [ ! -f "docker-compose.yml" ]; then
            echo "❌ docker-compose.yml not found"
            exit 1
          fi
          echo "✅ Project structure validated"

      # ✅ 4. Install ALL dependencies (frontend + backend)
      - name: Install all dependencies
        run: |
          echo "Installing server dependencies..."
          cd server && npm install --production=false
          echo "Installing client dependencies..."
          cd ../client && npm install --production=false
          echo "✅ Dependencies installed"

      # ✅ 5. Run ALL tests (frontend + backend)
      - name: Run all tests
        run: |
          echo "Running backend tests..."
          cd server && npm test
          echo "Running frontend tests..."
          cd ../client && npm test -- --watchAll=false
          echo "✅ All tests passed"

      # ✅ 6. Build project (frontend)
      - name: Build project
        run: |
          echo "Building frontend..."
          cd client && npm run build
          if [ ! -d "dist" ]; then
            echo "❌ Frontend build failed - dist directory not created"
            exit 1
          fi
          echo "✅ Frontend build completed"

      # ✅ 7. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ 8. Build and validate Docker containers
      - name: Build Docker containers
        run: |
          echo "Building Docker containers..."
          docker-compose build
          echo "Validating docker-compose configuration..."
          docker-compose config
          echo "✅ Docker containers built successfully"

      # ✅ 9. Trigger deployment on Render
      - name: Deploy to Render
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Render deployment..."
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
            echo "✅ Deployment triggered"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL not configured - skipping deployment"
          fi
