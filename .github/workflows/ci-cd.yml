name: Full CI/CD Pipeline

on:
  push:
    branches:
      - b1 # change if needed

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Pull latest code
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ 3. Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd server
          npm install

      # ✅ 4. Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      # ✅ 5. Run backend tests (optional)
      - name: Run backend tests
        run: |
          cd server
          npm test || echo "No backend tests"

      # ✅ 6. Run frontend tests (optional)
      - name: Run frontend tests
        run: |
          cd client
          npm test -- --watchAll=false || echo "No frontend tests"

      # ✅ 7. Build frontend
      - name: Build frontend
        run: |
          cd client
          npm run build

      # ✅ 8. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ✅ 9. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ 10. Build Docker Image (uses your Dockerfile)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/placement-tracker:latest .

      # ✅ 11. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/placement-tracker:latest

      # ✅ 12. Trigger deployment on Render
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
