services:
  mongo:
    image: mongo:7
    container_name: placement-tracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./server
    container_name: placement-tracker-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/placement_tracker
      PORT: "5000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./client
    container_name: placement-tracker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
